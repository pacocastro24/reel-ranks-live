<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reel Ranks</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    background: #060f1e;
    color: #c8e8f8;
    min-height: 100vh;
    padding: 20px 16px 60px;
  }
  h1 {
    text-align: center;
    font-size: 24px;
    color: #60c8f5;
    letter-spacing: 4px;
    margin-bottom: 4px;
  }
  .sub {
    text-align: center;
    font-size: 12px;
    color: #5a9ab8;
    letter-spacing: 2px;
    margin-bottom: 20px;
  }
  .top-bar {
    text-align: center;
    margin-bottom: 20px;
  }
  .reset-btn {
    background: transparent;
    border: 1px solid #5a3a1a;
    color: #8a5a3a;
    border-radius: 6px;
    padding: 5px 14px;
    font-size: 12px;
    cursor: pointer;
  }
  .reset-btn:hover { border-color: #f09060; color: #f09060; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
    margin-bottom: 20px;
  }
  .card {
    background: linear-gradient(160deg, #0a2a4a, #0d1f35);
    border: 2px solid #1e5a8a;
    border-radius: 16px;
    padding: 18px;
    position: relative;
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .fish { font-size: 22px; }
  .name-input {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1px solid #1e5a8a;
    color: #e0f4ff;
    font-size: 14px;
    outline: none;
    padding: 3px 0;
  }
  .name-input::placeholder { color: #3a7aaa; }
  .rank-area { text-align: center; margin: 10px 0; }
  .rank-emoji { font-size: 44px; display: block; margin-bottom: 4px; }
  .rank-name { font-size: 17px; font-weight: bold; }
  .rank-stars { font-size: 15px; color: #ffd700; margin-top: 3px; letter-spacing: 3px; }
  .pts-number { font-size: 26px; font-weight: bold; text-align: center; color: #60c8f5; margin: 10px 0 2px; }
  .pts-label { font-size: 10px; color: #5a9ab8; text-align: center; letter-spacing: 1px; margin-bottom: 10px; }
  .prog-label { display: flex; justify-content: space-between; font-size: 11px; color: #7ab8d8; margin-bottom: 4px; }
  .prog-bg { background: #0a1e35; border-radius: 6px; height: 9px; border: 1px solid #1e5a8a; overflow: hidden; margin-bottom: 14px; }
  .prog-fill { height: 100%; border-radius: 6px; transition: width 0.3s; }
  .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .btn {
    background: #0d2a45;
    border: 1px solid #1e5a8a;
    color: #a0d4f0;
    border-radius: 9px;
    padding: 10px 4px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.1s;
  }
  .btn:hover { background: #1a4a70; }
  .btn:active { opacity: 0.7; }
  .btn.red { border-color: #8a3a1a; color: #f09060; }
  .btn.red:hover { background: #3a1a0a; }
  .btn.wide { grid-column: span 2; background: #0a3a5a; border-color: #2a7aaa; }
  .btn.wide:hover { background: #1a5a80; }
  .exact-row { display: flex; gap: 8px; margin-top: 10px; }
  .exact-input {
    flex: 1;
    background: #0a1e35;
    border: 1px solid #1e5a8a;
    color: #e0f4ff;
    border-radius: 9px;
    padding: 8px 10px;
    font-size: 13px;
    outline: none;
  }
  .exact-btn {
    background: #0d3a5a;
    border: 1px solid #2a7aaa;
    color: #60c8f5;
    border-radius: 9px;
    padding: 8px 14px;
    font-size: 12px;
    cursor: pointer;
    font-weight: bold;
  }
  .exact-btn:hover { background: #1a5a80; }
  .del-btn {
    position: absolute;
    top: 10px;
    right: 12px;
    background: transparent;
    border: none;
    color: #2a4a6a;
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
  }
  .del-btn:hover { color: #f09060; }
  .add-card {
    background: transparent;
    border: 2px dashed #1e5a8a;
    border-radius: 16px;
    color: #3a7aaa;
    font-size: 15px;
    padding: 50px 20px;
    cursor: pointer;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    transition: all 0.2s;
  }
  .add-card:hover { border-color: #60c8f5; color: #60c8f5; }
  .wave { text-align: center; color: #1e4a6a; font-size: 20px; letter-spacing: 6px; margin: 14px 0; }
  .lb { background: #0a1e35; border: 1px solid #1e4a6a; border-radius: 14px; padding: 18px; }
  .lb-title { text-align: center; font-size: 13px; color: #60c8f5; letter-spacing: 2px; margin-bottom: 12px; }
  .lb-row { display: flex; align-items: center; gap: 10px; padding: 9px 4px; border-bottom: 1px solid #1a3a5a; }
  .lb-row:last-child { border-bottom: none; }
  .lb-pos { font-size: 14px; width: 28px; color: #5a9ab8; }
  .lb-fish { font-size: 18px; }
  .lb-name { flex: 1; font-size: 14px; color: #c0e0f5; }
  .lb-rank { font-size: 11px; color: #7ab8d8; flex: 1; }
  .lb-pts { font-size: 14px; color: #60c8f5; font-weight: bold; }
  @keyframes glow { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 24px #60c8f5} }
  .glow { animation: glow 0.8s ease; }
</style>
</head>
<body>
 
<h1>🎣 REEL RANKS</h1>
<p class="sub">∿ ranked fishing tracker ∿</p>
<div class="top-bar">
  <button class="reset-btn" id="resetBtn">reset session</button>
</div>
<div class="grid" id="grid"></div>
<div class="wave">〰 〰 〰</div>
<div class="lb">
  <div class="lb-title">⚓ LEADERBOARD</div>
  <div id="lb"></div>
</div>
 
<script>
var RANKS = [
  { name:'Unranked', icon:'🪝', color:'#aaaaaa', subs:0 },
  { name:'Bronze',   icon:'🐟', color:'#cd7f32', subs:4 },
  { name:'Silver',   icon:'🐠', color:'#c0c0c0', subs:4 },
  { name:'Gold',     icon:'🐡', color:'#ffd700', subs:4 },
  { name:'Platinum', icon:'🦈', color:'#4dd9e8', subs:2 },
  { name:'Diamond',  icon:'🐬', color:'#b0e0ff', subs:4 },
  { name:'Master',   icon:'🐋', color:'#ff9fff', subs:0 },
  { name:'Legend',   icon:'🦑', color:'#ffd700', subs:0 }
];
var FISH = ['🎣','🐟','🐠','🐡','🦈','🐬','🐳','🦑'];
 
function info(pts) {
  if (pts < 0) pts = 0;
  var tier = Math.min(Math.floor(pts / 100), RANKS.length - 1);
  var r = RANKS[tier];
  var sp = pts % 100;
  var sub = r.subs > 0 ? Math.min(Math.floor(sp / 25) + 1, r.subs) : 0;
  var pip = sp % 25;
  var pct = (pip / 25) * 100;
  var label = r.subs > 0 ? r.name + ' ' + sub : r.name;
  var stars = '';
  if (r.subs > 0) for (var i = 0; i < r.subs; i++) stars += i < sub ? '★' : '☆';
  return { r:r, tier:tier, sub:sub, pip:pip, pct:pct, label:label, stars:stars };
}
 
var players = [
  {id:1, name:'', pts:0},
  {id:2, name:'', pts:0},
  {id:3, name:'', pts:0}
];
var nid = 4;
 
function save() {
  try { localStorage.setItem('rr', JSON.stringify({players:players, nid:nid})); } catch(e) {}
}
 
function load() {
  try {
    var d = JSON.parse(localStorage.getItem('rr'));
    if (d && d.players && d.players.length) { players = d.players; nid = d.nid || 4; }
  } catch(e) {}
}
 
function add(id, delta) {
  for (var i = 0; i < players.length; i++) {
    if (players[i].id === id) {
      var prev = info(players[i].pts).tier;
      players[i].pts = Math.max(0, players[i].pts + delta);
      var next = info(players[i].pts).tier;
      save();
      render();
      if (prev !== next) {
        var c = document.querySelector('[data-id="' + id + '"]');
        if (c) { c.classList.add('glow'); setTimeout(function(){ c.classList.remove('glow'); }, 800); }
      }
      return;
    }
  }
}
 
function setExact(id) {
  var inp = document.getElementById('ex' + id);
  var v = parseInt(inp.value);
  if (isNaN(v)) return;
  for (var i = 0; i < players.length; i++) {
    if (players[i].id === id) { players[i].pts = Math.max(0, v); break; }
  }
  inp.value = '';
  save();
  render();
}
 
function del(id) {
  players = players.filter(function(p){ return p.id !== id; });
  save();
  render();
}
 
function reset() {
  if (!confirm('Reset all scores and names?')) return;
  players = [{id:1,name:'',pts:0},{id:2,name:'',pts:0},{id:3,name:'',pts:0}];
  nid = 4;
  save();
  render();
}
 
document.getElementById('resetBtn').onclick = reset;
 
function render() {
  var grid = document.getElementById('grid');
  grid.innerHTML = '';
 
  for (var i = 0; i < players.length; i++) {
    (function(p, idx) {
      var v = info(p.pts);
      var card = document.createElement('div');
      card.className = 'card';
      card.setAttribute('data-id', p.id);
 
      // delete button
      var db = document.createElement('button');
      db.className = 'del-btn';
      db.textContent = '✕';
      db.setAttribute('data-del', p.id);
      card.appendChild(db);
 
      // header
      var hdr = document.createElement('div');
      hdr.className = 'card-header';
      var fi = document.createElement('span');
      fi.className = 'fish';
      fi.textContent = FISH[idx % FISH.length];
      hdr.appendChild(fi);
      var ni = document.createElement('input');
      ni.className = 'name-input';
      ni.placeholder = 'Enter angler name…';
      ni.value = p.name;
      ni.setAttribute('data-nameid', p.id);
      hdr.appendChild(ni);
      card.appendChild(hdr);
 
      // rank area
      var ra = document.createElement('div');
      ra.className = 'rank-area';
      ra.innerHTML = '<span class="rank-emoji">' + v.r.icon + '</span>' +
        '<div class="rank-name" style="color:' + v.r.color + '">' + v.label + '</div>' +
        (v.stars ? '<div class="rank-stars">' + v.stars + '</div>' : '');
      card.appendChild(ra);
 
      // points
      var pn = document.createElement('div');
      pn.className = 'pts-number';
      pn.textContent = p.pts;
      card.appendChild(pn);
      var pl = document.createElement('div');
      pl.className = 'pts-label';
      pl.textContent = 'TOTAL POINTS';
      card.appendChild(pl);
 
      // progress
      var plbl = document.createElement('div');
      plbl.className = 'prog-label';
      plbl.innerHTML = '<span>sub-rank progress</span><span>' + v.pip + '/25</span>';
      card.appendChild(plbl);
      var pbg = document.createElement('div');
      pbg.className = 'prog-bg';
      var pf = document.createElement('div');
      pf.className = 'prog-fill';
      pf.style.width = v.pct + '%';
      pf.style.background = v.r.color;
      pbg.appendChild(pf);
      card.appendChild(pbg);
 
      // buttons
      var bg = document.createElement('div');
      bg.className = 'btn-grid';
      var btns = [
        ['+1 pt', 1, ''], ['−1 pt', -1, 'red'],
        ['+5 pts', 5, ''], ['−5 pts', -5, 'red'],
        ['+10 pts', 10, ''], ['−10 pts', -10, 'red'],
        ['+25 pts', 25, ''], ['−25 pts', -25, 'red'],
        ['+100 pts 🐠', 100, 'wide']
      ];
      btns.forEach(function(b) {
        var btn = document.createElement('button');
        btn.className = 'btn ' + b[2];
        btn.textContent = b[0];
        btn.setAttribute('data-pid', p.id);
        btn.setAttribute('data-delta', b[1]);
        bg.appendChild(btn);
      });
      card.appendChild(bg);
 
      // exact row
      var er = document.createElement('div');
      er.className = 'exact-row';
      var ei = document.createElement('input');
      ei.className = 'exact-input';
      ei.id = 'ex' + p.id;
      ei.type = 'number';
      ei.placeholder = 'Set exact points…';
      var eb = document.createElement('button');
      eb.className = 'exact-btn';
      eb.textContent = 'Set';
      eb.setAttribute('data-setid', p.id);
      er.appendChild(ei);
      er.appendChild(eb);
      card.appendChild(er);
 
      grid.appendChild(card);
    })(players[i], i);
  }
 
  // add angler button
  if (players.length < 6) {
    var ab = document.createElement('button');
    ab.className = 'add-card';
    ab.innerHTML = '<span style="font-size:30px">🎣</span><span>add angler</span>';
    ab.id = 'addBtn';
    grid.appendChild(ab);
  }
 
  renderLB();
}
 
// Single delegated event listener on the grid
document.getElementById('grid').addEventListener('click', function(e) {
  var t = e.target;
 
  // point buttons
  if (t.hasAttribute('data-delta')) {
    add(parseInt(t.getAttribute('data-pid')), parseInt(t.getAttribute('data-delta')));
    return;
  }
  // set exact
  if (t.hasAttribute('data-setid')) {
    setExact(parseInt(t.getAttribute('data-setid')));
    return;
  }
  // delete player
  if (t.hasAttribute('data-del')) {
    del(parseInt(t.getAttribute('data-del')));
    return;
  }
  // add angler
  if (t.id === 'addBtn' || t.parentElement.id === 'addBtn') {
    players.push({id:nid++, name:'', pts:0});
    save();
    render();
    return;
  }
});
 
// name input delegation
document.getElementById('grid').addEventListener('input', function(e) {
  var t = e.target;
  if (t.hasAttribute('data-nameid')) {
    var id = parseInt(t.getAttribute('data-nameid'));
    for (var i = 0; i < players.length; i++) {
      if (players[i].id === id) { players[i].name = t.value; break; }
    }
    save();
    renderLB();
  }
});
 
function renderLB() {
  var sorted = players.slice().sort(function(a,b){ return b.pts - a.pts; });
  var medals = ['🥇','🥈','🥉'];
  var html = '';
  for (var i = 0; i < sorted.length; i++) {
    var p = sorted[i];
    var v = info(p.pts);
    var fi = 0;
    for (var j = 0; j < players.length; j++) { if (players[j].id === p.id) { fi = j; break; } }
    html += '<div class="lb-row">' +
      '<div class="lb-pos">' + (i < 3 ? medals[i] : i+1) + '</div>' +
      '<div class="lb-fish">' + FISH[fi % FISH.length] + '</div>' +
      '<div class="lb-name">' + (p.name || 'Angler ' + p.id) + '</div>' +
      '<div class="lb-rank">' + v.label + ' ' + v.r.icon + '</div>' +
      '<div class="lb-pts">' + p.pts + 'pts</div>' +
      '</div>';
  }
  document.getElementById('lb').innerHTML = html;
}
 
load();
render();
</script>
</body>
</html>
