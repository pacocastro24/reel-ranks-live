<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🎣 Reel Ranks</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;400;500;700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100vh; }
body { font-family: 'Exo 2', sans-serif; background: #060f1e; color: #c8e8f8; padding: 1.5rem 1rem 3rem; }
body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 50% 0%, rgba(20,80,140,0.3) 0%, transparent 70%); pointer-events: none; z-index: 0; }
.wrap { max-width: 980px; margin: 0 auto; position: relative; z-index: 1; }
.app-title { font-family: 'Orbitron', monospace; text-align: center; font-size: 26px; color: #60c8f5; letter-spacing: 4px; margin-bottom: 4px; }
.app-sub { text-align: center; font-size: 12px; color: #5a9ab8; letter-spacing: 2px; margin-bottom: 0.4rem; }
.top-bar { text-align: center; margin-bottom: 1.4rem; }
.reset-btn { font-size: 11px; background: transparent; border: 1px solid #3a2a1a; color: #8a5a3a; border-radius: 6px; padding: 4px 12px; cursor: pointer; font-family: 'Exo 2', sans-serif; transition: all 0.15s; }
.reset-btn:hover { border-color: #f09060; color: #f09060; }
.players-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; margin-bottom: 1.4rem; }
.player-card { background: linear-gradient(160deg, #0a2a4a 0%, #0d1f35 100%); border: 1.5px solid #1e5a8a; border-radius: 16px; padding: 1.2rem; position: relative; }
.player-card.rank-up { animation: flashGlow 0.8s ease; }
@keyframes flashGlow { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 24px #60c8f5} }
.player-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.fish-anim { font-size: 22px; animation: swim 3s ease-in-out infinite; display: inline-block; }
@keyframes swim { 0%,100%{transform:translateX(0)} 50%{transform:translateX(5px)} }
.player-name-input { font-family: 'Orbitron', monospace; font-size: 13px; background: transparent; border: none; border-bottom: 1px solid #1e5a8a; color: #e0f4ff; width: 100%; outline: none; padding: 3px 0; }
.player-name-input::placeholder { color: #3a7aaa; font-size: 11px; }
.rank-badge { text-align: center; margin: 10px 0 6px; }
.rank-icon { font-size: 42px; line-height: 1; display: block; margin: 4px 0; }
.rank-tier { font-family: 'Orbitron', monospace; font-size: 16px; font-weight: 700; letter-spacing: 1px; }
.rank-stars { font-size: 14px; margin-top: 3px; color: #ffd700; letter-spacing: 3px; }
.points-display { font-family: 'Orbitron', monospace; font-size: 24px; font-weight: 700; text-align: center; color: #60c8f5; margin: 10px 0 2px; }
.points-sub { font-size: 10px; color: #5a9ab8; text-align: center; letter-spacing: 1px; margin-bottom: 8px; }
.progress-section { margin: 8px 0 12px; }
.progress-label { display: flex; justify-content: space-between; font-size: 11px; color: #7ab8d8; margin-bottom: 4px; }
.progress-bar-bg { background: #0a1e35; border-radius: 6px; height: 9px; overflow: hidden; border: 0.5px solid #1e5a8a; }
.progress-bar-fill { height: 100%; border-radius: 6px; transition: width 0.4s ease; }
.controls { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.pts-btn { background: #0d2a45; border: 1px solid #1e5a8a; color: #a0d4f0; border-radius: 9px; padding: 9px 4px; font-size: 13px; font-family: 'Exo 2', sans-serif; cursor: pointer; transition: all 0.15s; font-weight: 500; }
.pts-btn:hover { background: #1a4a70; border-color: #60c8f5; color: #fff; }
.pts-btn:active { transform: scale(0.96); }
.pts-btn.minus { border-color: #8a3a1a; color: #f09060; }
.pts-btn.minus:hover { background: #4a1a0a; border-color: #f09060; }
.pts-btn.wide { grid-column: span 2; background: #0a3a5a; border-color: #2a7aaa; }
.pts-btn.wide:hover { background: #1a5a80; }
.manual-row { margin-top: 10px; display: flex; gap: 6px; }
.manual-input { flex: 1; background: #0a1e35; border: 1px solid #1e5a8a; color: #e0f4ff; border-radius: 9px; padding: 8px 10px; font-size: 13px; font-family: 'Exo 2', sans-serif; outline: none; }
.manual-input:focus { border-color: #60c8f5; }
.manual-btn { background: #0d3a5a; border: 1px solid #2a7aaa; color: #60c8f5; border-radius: 9px; padding: 8px 14px; font-size: 12px; cursor: pointer; font-family: 'Exo 2', sans-serif; white-space: nowrap; font-weight: 600; }
.manual-btn:hover { background: #1a5a80; }
.remove-btn { position: absolute; top: 10px; right: 12px; background: transparent; border: none; color: #2a4a6a; font-size: 18px; cursor: pointer; line-height: 1; padding: 2px 4px; transition: color 0.15s; }
.remove-btn:hover { color: #f09060; }
.add-card { background: transparent; border: 1.5px dashed #1e5a8a; border-radius: 16px; color: #3a7aaa; font-family: 'Exo 2', sans-serif; font-size: 15px; padding: 3rem 1rem; cursor: pointer; width: 100%; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 10px; }
.add-card:hover { border-color: #60c8f5; color: #60c8f5; background: rgba(96,200,245,0.04); }
.add-card .add-fish { font-size: 30px; }
.wave { text-align: center; color: #1e4a6a; font-size: 20px; letter-spacing: 6px; margin: 12px 0; }
.leaderboard { background: #0a1e35; border: 1px solid #1e4a6a; border-radius: 14px; padding: 1.2rem; }
.lb-title { font-family: 'Orbitron', monospace; font-size: 13px; color: #60c8f5; letter-spacing: 2px; margin-bottom: 12px; text-align: center; }
.lb-row { display: flex; align-items: center; gap: 10px; padding: 9px 6px; border-bottom: 0.5px solid #1a3a5a; }
.lb-row:last-child { border-bottom: none; }
.lb-pos { font-family: 'Orbitron', monospace; font-size: 14px; width: 28px; color: #5a9ab8; }
.lb-fish { font-size: 18px; }
.lb-name { flex: 1; font-size: 14px; color: #c0e0f5; font-weight: 500; }
.lb-rank { font-size: 11px; color: #7ab8d8; flex: 1; }
.lb-pts { font-family: 'Orbitron', monospace; font-size: 14px; color: #60c8f5; font-weight: 700; }
</style>
</head>
<body>
<div class="wrap">
  <div class="app-title">🎣 REEL RANKS</div>
  <div class="app-sub">∿ ranked fishing tracker ∿</div>
  <div class="top-bar">
    <button class="reset-btn" onclick="resetAll()">reset session</button>
  </div>
  <div class="players-grid" id="grid"></div>
  <div class="wave">〰 〰 〰</div>
  <div class="leaderboard">
    <div class="lb-title">⚓ LEADERBOARD</div>
    <div id="lb"></div>
  </div>
</div>
 
<script>
const RANKS = [
  { name:'Unranked', icon:'🪝', color:'#888888', maxSubs:0 },
  { name:'Bronze',   icon:'🐟', color:'#cd7f32', maxSubs:4 },
  { name:'Silver',   icon:'🐠', color:'#c0c0c0', maxSubs:4 },
  { name:'Gold',     icon:'🐡', color:'#ffd700', maxSubs:4 },
  { name:'Platinum', icon:'🦈', color:'#4dd9e8', maxSubs:2 },
  { name:'Diamond',  icon:'🐬', color:'#b0e0ff', maxSubs:4 },
  { name:'Master',   icon:'🐋', color:'#ff9fff', maxSubs:0 },
  { name:'Legend',   icon:'🦑', color:'#ffd700', maxSubs:0 }
];
const FISH_ICONS = ['🎣','🐟','🐠','🐡','🦈','🐬','🐳','🦑'];
 
function getRankInfo(pts) {
  if (pts < 0) pts = 0;
  const tier = Math.min(Math.floor(pts / 100), RANKS.length - 1);
  const rank = RANKS[tier];
  const subPts = pts % 100;
  const sub = rank.maxSubs > 0 ? Math.min(Math.floor(subPts / 25) + 1, rank.maxSubs) : 0;
  const ptsInSub = subPts % 25;
  const pct = (ptsInSub / 25) * 100;
  const label = rank.maxSubs > 0 ? rank.name + ' ' + sub : rank.name;
  const stars = rank.maxSubs > 0 ? Array.from({length:rank.maxSubs}, (_,i) => i < sub ? '★' : '☆').join('') : '';
  return { rank, tier, sub, ptsInSub, pct, label, stars };
}
 
let players = [
  { id: 1, name: '', points: 0 },
  { id: 2, name: '', points: 0 },
  { id: 3, name: '', points: 0 }
];
let nextId = 4;
 
function save() {
  try { localStorage.setItem('reel-ranks', JSON.stringify({ players, nextId })); } catch(e) {}
}
 
function load() {
  try {
    const d = JSON.parse(localStorage.getItem('reel-ranks'));
    if (d && d.players && d.players.length) { players = d.players; nextId = d.nextId || 4; }
  } catch(e) {}
}
 
function resetAll() {
  if (!confirm('Reset all scores and names?')) return;
  players = [{ id:1,name:'',points:0 },{ id:2,name:'',points:0 },{ id:3,name:'',points:0 }];
  nextId = 4;
  save();
  render();
}
 
function addPoints(id, delta) {
  const p = players.find(x => x.id === id);
  if (!p) return;
  const prevTier = getRankInfo(p.points).tier;
  p.points = Math.max(0, p.points + delta);
  save();
  render();
  if (getRankInfo(p.points).tier !== prevTier) {
    const card = document.querySelector('[data-id="' + id + '"]');
    if (card) { card.classList.add('rank-up'); setTimeout(() => card.classList.remove('rank-up'), 800); }
  }
}
 
function setExact(id) {
  const inp = document.getElementById('ex-' + id);
  const val = parseInt(inp.value);
  if (isNaN(val)) return;
  const p = players.find(x => x.id === id);
  if (!p) return;
  p.points = Math.max(0, val);
  inp.value = '';
  save();
  render();
}
 
function removePlayer(id) {
  players = players.filter(x => x.id !== id);
  save();
  render();
}
 
function render() {
  const grid = document.getElementById('grid');
  const focusId = document.activeElement ? document.activeElement.getAttribute('data-id') : null;
  grid.innerHTML = '';
 
  players.forEach((p, idx) => {
    const { rank, ptsInSub, pct, label, stars } = getRankInfo(p.points);
    const fish = FISH_ICONS[idx % FISH_ICONS.length];
    const card = document.createElement('div');
    card.className = 'player-card';
    card.setAttribute('data-id', p.id);
    card.innerHTML = `
      <button class="remove-btn" onclick="removePlayer(${p.id})">✕</button>
      <div class="player-header">
        <span class="fish-anim">${fish}</span>
        <input class="player-name-input" placeholder="Enter angler name…" value="${p.name.replace(/"/g,'&quot;')}" data-id="${p.id}" />
      </div>
      <div class="rank-badge">
        <span class="rank-icon">${rank.icon}</span>
        <div class="rank-tier" style="color:${rank.color}">${label}</div>
        ${stars ? '<div class="rank-stars">' + stars + '</div>' : ''}
      </div>
      <div class="points-display">${p.points}</div>
      <div class="points-sub">TOTAL POINTS</div>
      <div class="progress-section">
        <div class="progress-label"><span>sub-rank progress</span><span>${ptsInSub}/25</span></div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%;background:${rank.color}"></div></div>
      </div>
      <div class="controls">
        <button class="pts-btn" onclick="addPoints(${p.id}, 1)">+1 pt</button>
        <button class="pts-btn minus" onclick="addPoints(${p.id}, -1)">−1 pt</button>
        <button class="pts-btn" onclick="addPoints(${p.id}, 5)">+5 pts</button>
        <button class="pts-btn minus" onclick="addPoints(${p.id}, -5)">−5 pts</button>
        <button class="pts-btn" onclick="addPoints(${p.id}, 10)">+10 pts</button>
        <button class="pts-btn minus" onclick="addPoints(${p.id}, -10)">−10 pts</button>
        <button class="pts-btn" onclick="addPoints(${p.id}, 25)">+25 pts</button>
        <button class="pts-btn minus" onclick="addPoints(${p.id}, -25)">−25 pts</button>
        <button class="pts-btn wide" onclick="addPoints(${p.id}, 100)">+100 pts 🐠</button>
      </div>
      <div class="manual-row">
        <input class="manual-input" id="ex-${p.id}" type="number" placeholder="Set exact points…" />
        <button class="manual-btn" onclick="setExact(${p.id})">Set</button>
      </div>
    `;
    grid.appendChild(card);
  });
 
  if (players.length < 6) {
    const btn = document.createElement('button');
    btn.className = 'add-card';
    btn.innerHTML = '<span class="add-fish">🎣</span>add angler';
    btn.onclick = () => { players.push({ id: nextId++, name: '', points: 0 }); save(); render(); };
    grid.appendChild(btn);
  }
 
  document.querySelectorAll('.player-name-input').forEach(inp => {
    if (inp.getAttribute('data-id') === focusId) inp.focus();
    inp.addEventListener('input', e => {
      const p = players.find(x => x.id === parseInt(e.target.getAttribute('data-id')));
      if (p) { p.name = e.target.value; save(); renderLB(); }
    });
  });
 
  renderLB();
}
 
function renderLB() {
  const sorted = [...players].sort((a, b) => b.points - a.points);
  const medals = ['🥇','🥈','🥉'];
  document.getElementById('lb').innerHTML = sorted.map((p, i) => {
    const { label, rank } = getRankInfo(p.points);
    const fi = players.findIndex(x => x.id === p.id);
    return `<div class="lb-row">
      <div class="lb-pos">${i < 3 ? medals[i] : i + 1}</div>
      <div class="lb-fish">${FISH_ICONS[fi % FISH_ICONS.length]}</div>
      <div class="lb-name">${p.name || 'Angler ' + p.id}</div>
      <div class="lb-rank">${label} ${rank.icon}</div>
      <div class="lb-pts">${p.points}pts</div>
    </div>`;
  }).join('');
}
 
load();
render();
</script>
</body>
</html>
